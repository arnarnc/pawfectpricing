<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokemon eBay Graded Checker</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .box {
    width: 92%;
    max-width: 760px;
    background: #1e1e1e;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
  }

  h2 {
    margin-top: 0;
    text-align: center;
    font-size: 22px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-top: 15px;
  }

  input {
    flex: 1;
    padding: 16px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  button {
    padding: 16px 24px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #0064d2;
    color: white;
    cursor: pointer;
    font-weight: bold;
    min-width: 140px;
    transition: 0.2s;
  }

  button:hover {
    background: #004ea8;
    transform: translateY(-1px);
  }

  .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 20px;
  }

  .card {
    background: #2a2a2a;
    padding: 16px;
    border-radius: 12px;
  }

  a {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 16px;
    background: #0064d2;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    word-break: break-word;
    font-size: 14px;
  }

  a:hover {
    background: #0050aa;
  }

  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #6cf;
    text-align: center;
  }

  @media(max-width:700px){
    .links {
      grid-template-columns: 1fr;
    }

    .input-row {
      flex-direction: column;
    }

    button {
      width: 100%;
    }
  }
</style>
</head>

<body>

<div class="box">

  <h2>Pokemon eBay Sold Checker</h2>

  <div class="input-row">
    <input id="cardInput"
           value="Gengar 14/132 Holo"
           placeholder="Enter card name (PSA / BGS / CGC optional)" />

    <button onclick="updateLinks()">Search</button>
  </div>

  <div class="links">

    <div class="card">
      <h3>Worldwide</h3>
      <a id="worldwideLink" target="_blank">Open Search</a>
    </div>

    <div class="card">
      <h3>Australia Only</h3>
      <a id="auLink" target="_blank">Open Search</a>
    </div>

  </div>

  <div class="status" id="status"></div>

</div>

<script>

function buildUrls(input) {

  const raw = input.trim();
  const encoded = encodeURIComponent(raw);

  const hasGraded = /PSA|BGS|CGC/i.test(raw);
  const gradedFlag = hasGraded ? "Yes" : "No";

  const worldwide =
    `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
    `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc&Graded=${gradedFlag}&_dcat=183454`;

  const australia =
    `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
    `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1&Graded=${gradedFlag}&_dcat=183454`;

  return { worldwide, australia, gradedFlag };
}

function updateLinks() {

  const value = document.getElementById("cardInput").value.trim();
  if (!value) return;

  localStorage.setItem("pokemonSearch", value);

  const urls = buildUrls(value);

  document.getElementById("worldwideLink").href = urls.worldwide;
  document.getElementById("auLink").href = urls.australia;

  document.getElementById("status").innerText =
    urls.gradedFlag === "Yes"
      ? "Detected: Graded Cards (PSA/BGS/CGC)"
      : "Detected: Raw Cards";
}

window.onload = () => {
  const saved = localStorage.getItem("pokemonSearch");
  if (saved) {
    document.getElementById("cardInput").value = saved;
  }
  updateLinks();
};

document.getElementById("cardInput")
  .addEventListener("keypress", function(e){
    if(e.key === "Enter") updateLinks();
  });

</script>

</body>
</html>
