<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokemon eBay Graded Checker</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .box {
    width: 90%;
    max-width: 750px;
    background: #1e1e1e;
    padding: 25px;
    border-radius: 12px;
  }

  h2 {
    margin-top: 0;
    text-align: center;
  }

  input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
  }

  .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: #2a2a2a;
    padding: 15px;
    border-radius: 10px;
  }

  a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 14px;
    background: #0064d2;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    word-break: break-word;
  }

  a:hover {
    background: #0050aa;
  }

  .status {
    margin-top: 10px;
    font-size: 13px;
    color: #6cf;
  }

  @media(max-width:700px){
    .links{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>

<div class="box">

  <h2>Pokemon eBay Sold Checker</h2>

  <input id="cardInput"
         value="Gengar 14/132 Holo"
         placeholder="Enter card name (PSA / BGS / CGC optional)"/>

  <div class="links">

    <div class="card">
      <h3>Worldwide</h3>
      <a id="worldwideLink" target="_blank">Generate</a>
    </div>

    <div class="card">
      <h3>Australia Only</h3>
      <a id="auLink" target="_blank">Generate</a>
    </div>

  </div>

  <div class="status" id="status"></div>

</div>

<script>

function buildUrls(input) {

  const raw = input.trim();
  const encoded = encodeURIComponent(raw);

  const hasGraded =
    /PSA|BGS|CGC/i.test(raw);

  const gradedFlag = hasGraded ? "Yes" : "No";

  const baseWorldwide =
    `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
    `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc`;

  const baseAustralia =
    `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
    `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1`;

  const worldwide =
    `${baseWorldwide}&Graded=${gradedFlag}&_dcat=183454`;

  const australia =
    `${baseAustralia}&Graded=${gradedFlag}&_dcat=183454`;

  return {
    worldwide,
    australia,
    gradedFlag
  };
}

function updateLinks() {

  const value = document.getElementById("cardInput").value.trim();

  if (!value) return;

  localStorage.setItem("pokemonSearch", value);

  const urls = buildUrls(value);

  const w = document.getElementById("worldwideLink");
  const a = document.getElementById("auLink");

  w.href = urls.worldwide;
  w.innerText = "Open Worldwide Search";

  a.href = urls.australia;
  a.innerText = "Open Australia Search";

  document.getElementById("status").innerText =
    "Detected: " + (urls.gradedFlag === "Yes"
      ? "Graded Cards Only (PSA/BGS/CGC)"
      : "Raw / Ungraded Cards");
}

window.onload = () => {

  const saved = localStorage.getItem("pokemonSearch");

  if (saved) {
    document.getElementById("cardInput").value = saved;
  }

  updateLinks();
};

document.getElementById("cardInput")
  .addEventListener("input", updateLinks);

</script>

</body>
</html>
