<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pawfect Pulls · Pricing Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090b;
      --surface:   #18181b;
      --surface2:  #27272a;
      --border:    #3f3f46;
      --border2:   #27272a;
      --purple:    #7c3aed;
      --purple-h:  #6d28d9;
      --green:     #16a34a;
      --green-h:   #15803d;
      --text:      #fafafa;
      --text2:     #a1a1aa;
      --text3:     #71717a;
      --r:         12px;
      --r-sm:      8px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 33vh 12px 40px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 24px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .header img {
      height: 72px;
      width: auto;
      flex-shrink: 0;
    }
    .header-text .brand {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border2);
    }

    /* ── eBay buttons ── */
    .ebay-section { display: flex; flex-direction: column; gap: 8px; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .btn-row a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 13px 6px;
      color: var(--text);
      text-decoration: none;
      border-radius: var(--r);
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      transition: filter 0.15s, transform 0.1s;
      text-align: center;
    }
    .btn-row a:hover  { filter: brightness(1.12); }
    .btn-row a:active { transform: scale(0.97); }
    .btn-row a .btn-icon { font-size: 17px; line-height: 1; }
    .btn-row a .btn-label { font-size: 12px; font-weight: 600; }
    .btn-row a .btn-sub   { font-size: 10px; font-weight: 400; opacity: 0.7; }
    .btn-sold  { background: var(--purple); }
    .btn-cheap { background: var(--green); }

    /* ── Auction toggle ── */
    .ebay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .toggle-switch {
      position: relative;
      width: 28px;
      height: 16px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 16px;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--purple); }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(12px); }

    /* ── Search input ── */
    .search-section { display: flex; flex-direction: column; gap: 8px; }

    .input-wrap { position: relative; }
    .input-wrap input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 13px 44px 13px 14px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--r);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-wrap input[type="text"]:focus  { border-color: var(--purple); }
    .input-wrap input[type="text"]::placeholder { color: var(--text3); font-weight: 400; }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border2);
      border: none;
      color: var(--text2);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .clear-btn:hover { background: var(--border); color: var(--text); }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      max-height: 200px;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .suggestions div {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid var(--border2);
      transition: background 0.1s;
    }
    .suggestions div:last-child { border-bottom: none; }
    .suggestions div:hover { background: var(--surface); }

    /* Status badge */
    .status-wrap { min-height: 18px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .status-badge.graded { background: rgba(234,88,12,0.15); color: #fb923c; }
    .status-badge.raw    { background: rgba(124,58,237,0.15); color: #a78bfa; }

    /* ── Comp entry ── */
    .comp-entry { display: flex; gap: 8px; align-items: stretch; }

    .price-wrap {
      position: relative;
      width: 100px;
      flex-shrink: 0;
    }
    .price-wrap input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 13px 8px 13px 24px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--r);
      outline: none;
      -moz-appearance: textfield;
      transition: border-color 0.15s;
    }
    .price-wrap input[type="number"]:focus { border-color: var(--purple); }
    .price-wrap input[type="number"]::-webkit-outer-spin-button,
    .price-wrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .price-prefix {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
      pointer-events: none;
      font-weight: 500;
    }

    .add-btn {
      flex: 1;
      padding: 13px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--r);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: filter 0.15s, transform 0.1s;
    }
    .add-btn:hover  { filter: brightness(1.1); }
    .add-btn:active { transform: scale(0.98); }

    /* ── Comp list ── */
    .comp-list-section { display: flex; flex-direction: column; gap: 12px; }

    .comp-table {
      width: 100%;
      border-collapse: collapse;
    }
    .comp-table thead th {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 6px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border2);
    }
    .comp-table tbody td {
      padding: 9px 6px;
      border-bottom: 1px solid var(--border2);
      font-size: 13px;
      vertical-align: middle;
    }
    .comp-table tbody tr:last-child td { border-bottom: none; }

    .card-label {
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
      padding-right: 4px;
    }
    .comp-price-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--r-sm);
      padding: 6px 6px 6px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      width: 82px;
      -moz-appearance: textfield;
      transition: border-color 0.15s;
    }
    .comp-price-input:focus { outline: none; border-color: var(--purple); }
    .comp-price-input::-webkit-outer-spin-button,
    .comp-price-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .price-cell { position: relative; display: inline-block; }
    .price-cell-dollar {
      position: absolute;
      left: 6px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 11px;
      pointer-events: none;
    }

    .comp-pct-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 6px 4px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      width: 62px;
      transition: border-color 0.15s;
    }
    .comp-pct-select:focus { border-color: var(--purple); }

    .del-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s, background 0.1s;
    }
    .del-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* Totals panel */
    .comp-totals {
      background: var(--surface2);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .total-val   { font-size: 16px; font-weight: 700; }
    .total-row.market .total-val { color: var(--text); }
    .total-row.payout .total-val { color: #4ade80; }
    .total-sep { border: none; border-top: 1px solid var(--border2); }

    .clear-all-btn {
      width: 100%;
      background: transparent;
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.25);
      padding: 10px;
      border-radius: var(--r);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .clear-all-btn:hover { background: rgba(248,113,113,0.08); }

    /* ── Help link ── */
    .help-link {
      position: absolute;
      top: 0; right: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text3);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .help-link:hover { background: var(--border2); color: var(--text2); }

    .card { position: relative; }

    /* ── Desktop ── */
    @media (min-width: 600px) {
      body {
        padding-top: 0;
        align-items: center;
        justify-content: center;
      }
      .card { padding: 32px 28px 36px; gap: 22px; }
    }
  </style>
</head>

    <div class="status-wrap" id="status"></div>

  <hr class="divider">

  <!-- Comp entry -->
  <div class="search-section">
    <p class="section-label">Add to Comp List</p>
    <div class="comp-entry">
      <div class="price-wrap">
        <span class="price-prefix">$</span>
        <input type="number" id="priceInput" placeholder="0.00" min="0" step="0.01" />
      </div>
      <button class="add-btn" onclick="addToComp()">+ Add to List</button>
    </div>
  </div>

  <!-- Comp list -->
  <div id="compSection"></div>

</div>

  // ── Auction toggle ────────────────────────────────────────
  let excludeAuctions = localStorage.getItem("excludeAuctions") === "true";
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("excludeAuctions").checked = excludeAuctions;
  });
  function onToggleAuctions() {
    excludeAuctions = document.getElementById("excludeAuctions").checked;
    localStorage.setItem("excludeAuctions", excludeAuctions);
    update();
  }

  // ── eBay helpers ──────────────────────────────────────────
  function isGraded(input) {
    return /\b(PSA|BGS|CGC|TAG)\s?(?:10(?:\.0)?|[1-9](?:\.[05])?)\b/i.test(input);
  }
  function normalizeCardNumber(input) {
    return input.replace(/(\d+)\s+(\d+)(?=\s|$)/, "$1/$2");
  }
  const CONDITIONS = { lp:"lightly played", nm:"near mint", mp:"moderately played", hp:"heavily played", dmg:"damaged" };
  const PRODUCTS   = { etb:"(etb,elite trainer box)", bbx:"booster box" };

  function expandConditions(input) {
    return input.replace(/\b(lp|nm|mp|hp|dmg)\b/gi, m => `(${m},${CONDITIONS[m.toLowerCase()]})`);
  }
  function expandProducts(input) {
    return input.replace(/\b(etb|bbx)\b/gi, m => PRODUCTS[m.toLowerCase()]);
  }
  function isSealedProduct(input) {
    return /\b(etb|elite trainer box|booster box|bbx|sealed|collection box|tin)\b/i.test(input);
  }
  function buildUrls(input) {
    const normalized = expandProducts(expandConditions(normalizeCardNumber(input)));
    const encoded    = encodeURIComponent(normalized);
    const gradedFlag = isGraded(input) ? "Yes" : "No";
    const base = isSealedProduct(input)
      ? `_sacat=0`
      : `_sacat=0&Graded=${gradedFlag}&_dcat=183454`;
    const binParam = excludeAuctions ? "&LH_BIN=1" : "";
    return {
      worldwideSold: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc${binParam}`,
      auSold:        `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1${binParam}`,
      worldwideChea: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_BIN=1&_sop=15`
    };
  }

  function update() {
    const value = document.getElementById("cardInput").value.trim();
    const statusEl = document.getElementById("status");
    if (!value) { statusEl.innerHTML = ""; return; }
    const urls = buildUrls(value);
    document.getElementById("worldwideSoldLink").href  = urls.worldwideSold;
    document.getElementById("auSoldLink").href         = urls.auSold;
    document.getElementById("worldwideCheapLink").href = urls.worldwideChea;
    if (isGraded(value)) {
      statusEl.innerHTML = '<span class="status-badge graded">⚡ Graded Card</span>';
    } else {
      statusEl.innerHTML = '<span class="status-badge raw">🃏 Raw Card</span>';
    }
    renderSuggestions();
  }

  function renderSuggestions() {
    const input = document.getElementById("cardInput").value.toLowerCase();
    const box   = document.getElementById("suggestions");
    box.innerHTML = "";
    if (!input) return;
    [...POKEMON_NAMES, ...TRAINER_NAMES]
      .filter(x => x.toLowerCase().startsWith(input))
      .slice(0, 10)
      .forEach(item => {
        const div = document.createElement("div");
        div.innerText = item;
        div.onmousedown = e => e.preventDefault();
        div.onclick = () => {
          const ci = document.getElementById("cardInput");
          ci.value = item;
          update();
          box.innerHTML = "";
          ci.focus();
          ci.setSelectionRange(ci.value.length, ci.value.length);
        };
        box.appendChild(div);
      });
  }

  function clearInput() {
    const input = document.getElementById("cardInput");
    input.value = "";
    input.focus();
    document.getElementById("suggestions").innerHTML = "";
    document.getElementById("status").innerHTML = "";
  }

  document.addEventListener("click", e => {
    if (!document.querySelector(".input-wrap").contains(e.target))
      document.getElementById("suggestions").innerHTML = "";
  });

  // ── Comp list ─────────────────────────────────────────────
  let compItems = JSON.parse(localStorage.getItem("compItems") || "[]");
  let headerPct = 100;

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function saveComp() { localStorage.setItem("compItems", JSON.stringify(compItems)); }

  function addToComp() {
    const label = document.getElementById("cardInput").value.trim();
    const raw   = document.getElementById("priceInput").value;
    const price = parseFloat(raw);
    if (!label || raw === "" || isNaN(price) || price < 0) return;
    compItems.push({ id: Date.now(), label, price, pct: headerPct });
    saveComp();
    renderComp();
    document.getElementById("priceInput").value = "";
  }

  function cascadePct(val) {
    headerPct = parseInt(val) || 100;
    compItems.forEach(x => x.pct = headerPct);
    saveComp();
    renderComp();
  }

  function deleteComp(id) {
    compItems = compItems.filter(x => x.id !== id);
    saveComp();
    renderComp();
  }

  function clearAllComp() {
    compItems = [];
    saveComp();
    renderComp();
  }

  function updateCompField(id, field, val) {
    const item = compItems.find(x => x.id === id);
    if (!item) return;
    if (field === "price") item.price = parseFloat(val) || 0;
    if (field === "pct")   item.pct   = parseInt(val)   || 100;
    saveComp();
    const m = compItems.reduce((s, x) => s + x.price, 0);
    const p = compItems.reduce((s, x) => s + x.price * (x.pct / 100), 0);
    const em = document.getElementById("compMarket");
    const ep = document.getElementById("compPayout");
    if (em) em.textContent = `$${m.toFixed(2)}`;
    if (ep) ep.textContent = `$${p.toFixed(2)}`;
  }

  function renderComp() {
    const section = document.getElementById("compSection");
    if (compItems.length === 0) { section.innerHTML = ""; return; }

    const marketTotal = compItems.reduce((s, x) => s + x.price, 0);
    const payoutTotal = compItems.reduce((s, x) => s + x.price * (x.pct / 100), 0);

    const pctOpts = v => [100,95,90,85,80,75,70,65,60,55,50]
      .map(p => `<option value="${p}"${p===v?' selected':''}>${p}%</option>`).join("");

    const headerOpts = [100,95,90,85,80,75,70,65,60,55,50]
      .map(p => `<option value="${p}"${p===headerPct?' selected':''}>${p}%</option>`).join("");

    const rows = compItems.map(item => `
      <tr>
        <td class="card-label">${escHtml(item.label)}</td>
        <td>
          <span class="price-cell">
            <span class="price-cell-dollar">$</span>
            <input class="comp-price-input" type="number" min="0" step="0.01"
              value="${item.price.toFixed(2)}"
              oninput="updateCompField(${item.id},'price',this.value)"
              onchange="updateCompField(${item.id},'price',this.value)" />
          </span>
        </td>
        <td>
          <select class="comp-pct-select" onchange="updateCompField(${item.id},'pct',this.value)">
            ${pctOpts(item.pct)}
          </select>
        </td>
        <td><button class="del-btn" onclick="deleteComp(${item.id})" title="Remove">×</button></td>
      </tr>`).join("");

    section.innerHTML = `
      <hr class="divider">
      <div class="comp-list-section">
        <p class="section-label">Comp List · ${compItems.length} item${compItems.length !== 1 ? 's' : ''}</p>
        <table class="comp-table">
          <thead><tr>
            <th>Card</th>
            <th>Price</th>
            <th>
              <select class="comp-pct-select" onchange="cascadePct(this.value)" title="Apply to all rows">
                <option value="100">% All</option>
                ${headerOpts}
              </select>
            </th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="comp-totals">
          <div class="total-row market">
            <span class="total-label">Market Value</span>
            <span class="total-val" id="compMarket">$${marketTotal.toFixed(2)}</span>
          </div>
          <hr class="total-sep">
          <div class="total-row payout">
            <span class="total-label">Payout Offer</span>
            <span class="total-val" id="compPayout">$${payoutTotal.toFixed(2)}</span>
          </div>
        </div>
        <button class="clear-all-btn" onclick="clearAllComp()">Clear All</button>
      </div>`;
  }

  window.onload = () => { renderComp(); };
</script>
