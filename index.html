<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pokemon eBay Smart Viewer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .box {
    width: 92%;
    max-width: 820px;
    background: #1e1e1e;
    padding: 28px;
    border-radius: 14px;
  }

  h2 {
    text-align: center;
    margin-top: 0;
  }

  .input-wrap {
    position: relative;
  }

  input {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  .suggestions {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    background: #2a2a2a;
    border-radius: 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
  }

  .suggestions div {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #333;
  }

  .suggestions div:hover {
    background: #444;
  }

  .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 18px;
  }

  .card {
    background: #2a2a2a;
    padding: 16px;
    border-radius: 12px;
  }

  a {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 16px;
    background: #0064d2;
    color: white;
    text-decoration: none;
    border-radius: 8px;
  }

  a:hover {
    background: #0050aa;
  }

  .status {
    margin-top: 12px;
    font-size: 13px;
    color: #6cf;
    text-align: center;
  }

  .actions {
    text-align: center;
    margin-top: 14px;
  }

  button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #444;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #666;
  }

  @media(max-width:700px){
    .links {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="box">

  <h2>Pokemon eBay Smart Viewer</h2>

  <div class="input-wrap">
    <input id="cardInput"
           placeholder="Enter Pokémon card..."
           value="Gengar 14/132 Holo"
           oninput="update()" />

    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="links">

    <div class="card">
      <h3>Worldwide</h3>
      <a id="worldwideLink" target="_blank">Open Search</a>
    </div>

    <div class="card">
      <h3>Australia</h3>
      <a id="auLink" target="_blank">Open Search</a>
    </div>

  </div>

  <div class="status" id="status"></div>

  <div class="actions">
    <button onclick="resetHistory()">Reset History</button>
  </div>

</div>

<script>

const KEY = "pokemon_history_1000";

function getHistory() {
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function saveHistory(value) {

  let history = getHistory();

  value = value.trim();
  if (!value) return;

  // remove duplicate
  history = history.filter(x => x !== value);

  // add newest first
  history.unshift(value);

  // limit to 1000
  if (history.length > 1000) {
    history = history.slice(0, 1000);
  }

  localStorage.setItem(KEY, JSON.stringify(history));
}

function buildUrls(input) {

  const encoded = encodeURIComponent(input);

  const hasGraded = /PSA|BGS|CGC/i.test(input);
  const gradedFlag = hasGraded ? "Yes" : "No";

  return {
    worldwide:
      `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
      `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc&Graded=${gradedFlag}&_dcat=183454`,

    australia:
      `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}` +
      `&_sacat=0&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1&Graded=${gradedFlag}&_dcat=183454`
  };
}

function update() {

  const value = document.getElementById("cardInput").value.trim();
  if (!value) return;

  saveHistory(value);

  const urls = buildUrls(value);

  document.getElementById("worldwideLink").href = urls.worldwide;
  document.getElementById("auLink").href = urls.australia;

  document.getElementById("status").innerText =
    /PSA|BGS|CGC/i.test(value)
      ? "Graded Mode Detected"
      : "Raw Mode";

  renderSuggestions();
}

function renderSuggestions() {

  const history = getHistory();
  const box = document.getElementById("suggestions");
  const input = document.getElementById("cardInput").value.toLowerCase();

  box.innerHTML = "";

  if (!input) return;

  const filtered = history
    .filter(x => x.toLowerCase().includes(input))
    .slice(0, 10);

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.innerText = item;
    div.onclick = () => {
      document.getElementById("cardInput").value = item;
      update();
    };
    box.appendChild(div);
  });
}

function resetHistory() {
  localStorage.removeItem(KEY);
  document.getElementById("suggestions").innerHTML = "";
  document.getElementById("status").innerText = "History cleared ✔";
}

window.onload = () => {
  update();
};

document.addEventListener("click", (e) => {
  if (!document.querySelector(".input-wrap").contains(e.target)) {
    document.getElementById("suggestions").innerHTML = "";
  }
});

</script>

</body>
</html>
