<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pawfect Pulls · Pricing Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090b;
      --surface:   #18181b;
      --surface2:  #27272a;
      --border:    #3f3f46;
      --border2:   #27272a;
      --purple:    #7c3aed;
      --purple-h:  #6d28d9;
      --green:     #16a34a;
      --green-h:   #15803d;
      --text:      #fafafa;
      --text2:     #a1a1aa;
      --text3:     #71717a;
      --r:         12px;
      --r-sm:      8px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 33vh 12px 40px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 24px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Desktop mode: anchor the app to the top-left so it sits clear of the
       eBay popup panels. Normal browser view stays centered (unchanged). */
    body.desktop-mode {
      justify-content: flex-start;
      align-items: flex-start;
      padding: 20px 16px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .header img {
      height: 72px;
      width: auto;
      flex-shrink: 0;
    }
    .header-text .brand {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border2);
    }

    /* ── eBay buttons ── */
    .ebay-section { display: flex; flex-direction: column; gap: 8px; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .btn-row a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 13px 6px;
      color: var(--text);
      text-decoration: none;
      border-radius: var(--r);
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      transition: filter 0.15s, transform 0.1s;
      text-align: center;
    }
    .btn-row a:hover  { filter: brightness(1.12); }
    .btn-row a:active { transform: scale(0.97); }
    .btn-row a .btn-icon { font-size: 17px; line-height: 1; }
    .btn-row a .btn-label { font-size: 12px; font-weight: 600; }
    .btn-row a .btn-sub   { font-size: 10px; font-weight: 400; opacity: 0.7; }
    .btn-sold  { background: var(--purple); }
    .btn-cheap { background: var(--green); }

    /* ── Desktop "Go" mode ── */
    .go-row { display: grid; grid-template-columns: 3fr 1fr; gap: 8px; }
    .btn-go, .btn-close {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 13px 6px;
      color: var(--text);
      border: none;
      cursor: pointer;
      border-radius: var(--r);
      font-weight: 700;
      font-size: 14px;
      font-family: inherit;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-go    { background: linear-gradient(135deg, var(--purple), var(--green)); }
    .btn-close { background: var(--border); color: var(--text2); font-weight: 600; font-size: 12px; }
    .btn-go:hover, .btn-close:hover  { filter: brightness(1.12); }
    .btn-go:active, .btn-close:active { transform: scale(0.97); }
    .btn-go .btn-icon { font-size: 17px; }
    .header-toggles { display: flex; align-items: center; gap: 14px; }

    /* ── Auction toggle ── */
    .ebay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .toggle-switch {
      position: relative;
      width: 28px;
      height: 16px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 16px;
      transition: background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--purple); }
    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(12px); }

    /* ── Search input ── */
    .search-section { display: flex; flex-direction: column; gap: 8px; }

    .input-wrap { position: relative; }
    .input-wrap input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 13px 44px 13px 14px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--r);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-wrap input[type="text"]:focus  { border-color: var(--purple); }
    .input-wrap input[type="text"]::placeholder { color: var(--text3); font-weight: 400; }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--border2);
      border: none;
      color: var(--text2);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .clear-btn:hover { background: var(--border); color: var(--text); }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      max-height: 200px;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .suggestions div {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid var(--border2);
      transition: background 0.1s;
    }
    .suggestions div:last-child { border-bottom: none; }
    .suggestions div:hover { background: var(--surface); }
    /* Live card-lookup rows: name on top, number/set below */
    .suggestions div.card-sug {
      display: flex; flex-direction: column; gap: 2px;
    }
    .suggestions .sug-meta {
      font-size: 12px; font-weight: 500; opacity: 0.6;
    }
    .suggestions .sug-num {
      font-variant-numeric: tabular-nums;
      color: var(--purple); font-weight: 700;
    }
    .suggestions .sug-info {
      padding: 10px 14px; font-size: 13px; opacity: 0.55;
      cursor: default; font-weight: 500;
    }
    .suggestions .sug-info:hover { background: none; }
    .suggestions .sug-src {
      display: inline-block; margin-left: 4px; padding: 0 5px;
      border-radius: 4px; font-size: 10px; font-weight: 700;
      letter-spacing: .03em; text-transform: uppercase;
      background: var(--surface); color: var(--purple); opacity: .85;
    }

    /* Status badge */
    .status-wrap { min-height: 18px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .status-badge.graded { background: rgba(234,88,12,0.15); color: #fb923c; }
    .status-badge.raw    { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .status-badge.sealed { background: rgba(74,222,128,0.15); color: #4ade80; }

    .pop-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 9px;
      border-radius: 20px;
      text-decoration: none;
      background: rgba(56,189,248,0.15);
      color: #38bdf8;
      transition: background 0.1s;
    }
    .pop-link:hover { background: rgba(56,189,248,0.28); }

    /* ── Comp entry ── */
    .comp-entry { display: flex; gap: 8px; align-items: stretch; }

    .price-wrap {
      position: relative;
      width: 100px;
      flex-shrink: 0;
    }
    .price-wrap input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 13px 8px 13px 24px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--r);
      outline: none;
      transition: border-color 0.15s;
    }
    .price-wrap input[type="text"]:focus { border-color: var(--purple); }
    .price-prefix {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
      pointer-events: none;
      font-weight: 500;
    }

    .add-btn {
      flex: 1;
      padding: 13px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--r);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: filter 0.15s, transform 0.1s;
    }
    .add-btn:hover  { filter: brightness(1.1); }
    .add-btn:active { transform: scale(0.98); }

    /* ── Comp list ── */
    .comp-list-section { display: flex; flex-direction: column; gap: 12px; }

    .comp-table {
      width: 100%;
      border-collapse: collapse;
    }
    .comp-table thead th {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 6px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border2);
    }
    .comp-table tbody td {
      padding: 9px 6px;
      border-bottom: 1px solid var(--border2);
      font-size: 13px;
      vertical-align: middle;
    }
    .comp-table tbody tr:last-child td { border-bottom: none; }

    .card-label {
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
      padding-right: 4px;
    }
    .comp-price-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--r-sm);
      padding: 6px 6px 6px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      width: 82px;
      transition: border-color 0.15s;
    }
    .comp-price-input:focus { outline: none; border-color: var(--purple); }

    .price-cell { position: relative; display: inline-block; }
    .price-cell-dollar {
      position: absolute;
      left: 6px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 11px;
      pointer-events: none;
    }

    .comp-pct-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 6px 4px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      width: 62px;
      transition: border-color 0.15s;
    }
    .comp-pct-select:focus { border-color: var(--purple); }

    .del-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s, background 0.1s;
    }
    .del-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    .row-actions { display: flex; align-items: center; gap: 2px; justify-content: flex-end; }

    .strike-btn {
      background: transparent;
      border: none;
      color: var(--text3);
      width: 28px; height: 28px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s, background 0.1s;
    }
    .strike-btn:hover { color: var(--text); background: var(--surface2); }
    .strike-btn.active { color: var(--purple); background: rgba(124,58,237,0.12); }
    .strike-btn.active:hover { color: #a78bfa; background: rgba(124,58,237,0.2); }

    .item-row.excluded { opacity: 0.45; }
    .item-row.excluded .card-label,
    .item-row.excluded .trade-name-input { text-decoration: line-through; }
    .item-row.excluded .comp-price-input,
    .item-row.excluded .comp-pct-select { text-decoration: line-through; }

    /* Totals panel */
    .comp-totals {
      background: var(--surface2);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-label { font-size: 13px; font-weight: 500; color: var(--text2); }
    .total-val   { font-size: 16px; font-weight: 700; color: var(--text); }
    .total-row.rate .total-label { color: var(--text3); }
    .total-row.rate .total-val { font-size: 13px; font-weight: 600; color: var(--text3); }
    .total-row.payout .total-val { color: #a78bfa; }
    .total-row.payout .total-label { font-weight: 700; color: var(--text); }
    .total-op {
      display: inline-block;
      width: 18px;
      color: var(--text3);
      font-weight: 700;
    }
    .total-sep { border: none; border-top: 1px solid var(--border2); }

    .clear-all-btn {
      width: 100%;
      background: transparent;
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.25);
      padding: 10px;
      border-radius: var(--r);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .clear-all-btn:hover { background: rgba(248,113,113,0.08); }

    /* ── Saved comp tabs ── */
    .saved-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .saved-tab {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .saved-tab:hover {
      border-color: var(--purple);
      color: var(--text);
      background: rgba(124,58,237,0.1);
    }
    .saved-tab:last-child:nth-child(odd) { grid-column: span 2; }


    /* ── Section block ── */
    .section-block { display: flex; flex-direction: column; gap: 12px; }

    .block-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .icon-add-btn {
      width: 26px; height: 26px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text3);
      font-size: 18px;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .icon-add-btn:hover { border-color: var(--purple); color: var(--purple); }

    /* ── Trade-out inline inputs ── */
    .trade-name-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--r-sm);
      padding: 6px 8px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .trade-name-input:focus { border-color: var(--purple); }
    .trade-name-input::placeholder { color: var(--text3); font-weight: 400; }

    /* ── Subtotal rows ── */
    .subtotal-row {
      background: var(--surface2);
      border-radius: var(--r);
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .subtotal-label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .subtotal-val   { font-size: 15px; font-weight: 700; }
    .subtotal-val.orange { color: #fb923c; }
    .subtotal-val.green  { color: #4ade80; }

    /* ── Settlement ── */
    .settlement-result {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: var(--r);
      padding: 14px 16px;
    }
    .settlement-result .r-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
    .settlement-result .r-val   { font-size: 20px; font-weight: 800; }
    .settlement-result.pay-customer { background: rgba(251,146,60,0.1); }
    .settlement-result.pay-customer .r-label,
    .settlement-result.pay-customer .r-val   { color: #fb923c; }
    .settlement-result.pay-vendor   { background: rgba(74,222,128,0.08); }
    .settlement-result.pay-vendor .r-label,
    .settlement-result.pay-vendor .r-val     { color: #4ade80; }
    .settlement-result.even-trade   { background: rgba(124,58,237,0.1); }
    .settlement-result.even-trade .r-label,
    .settlement-result.even-trade .r-val     { color: #a78bfa; }

    /* ── Help link ── */
    .help-link {
      position: absolute;
      top: 0; right: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text3);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .help-link:hover { background: var(--border2); color: var(--text2); }

    .card { position: relative; }

    /* ── Desktop ── */
    @media (min-width: 600px) {
      body {
        padding-top: 0;
        align-items: center;
        justify-content: center;
      }
      .card { padding: 32px 28px 36px; gap: 22px; }
    }
  </style>
</head>
<body>
<div class="card">

  <a href="help.html" class="help-link" title="How to use">?</a>

  <!-- Header -->
  <div class="header">
    <img src="logo-transparent.png" alt="Pawfect Pulls" />
    <div class="header-text">
      <p class="brand">Pawfect</p>
      <h1>PRICING</h1>
    </div>
  </div>

  <hr class="divider">

  <!-- eBay search -->
  <div class="ebay-section">
    <div class="ebay-header">
      <p class="section-label">Search eBay</p>
      <div class="header-toggles">
        <label class="toggle-row" for="excludeAuctions">
          <span class="toggle-label">No auctions</span>
          <span class="toggle-switch">
            <input type="checkbox" id="excludeAuctions" onchange="onToggleAuctions()" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <label class="toggle-row" for="desktopMode">
          <span class="toggle-label">Desktop</span>
          <span class="toggle-switch">
            <input type="checkbox" id="desktopMode" onchange="onToggleDesktop()" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </div>
    <div class="btn-row" id="btnRow">
      <a id="worldwideSoldLink" class="btn-sold" target="_blank">
        <span class="btn-icon">🌍</span>
        <span class="btn-label">Global</span>
        <span class="btn-sub">Sold</span>
      </a>
      <a id="auSoldLink" class="btn-sold" target="_blank">
        <span class="btn-icon">🇦🇺</span>
        <span class="btn-label">Australia</span>
        <span class="btn-sub">Sold</span>
      </a>
      <a id="worldwideCheapLink" class="btn-cheap" target="_blank">
        <span class="btn-icon">💰</span>
        <span class="btn-label">Cheapest</span>
        <span class="btn-sub">Buy Now</span>
      </a>
    </div>
    <div class="go-row" id="goRow" style="display:none">
      <button class="btn-go" onclick="openAll()">
        <span class="btn-icon">⚡</span>

  // ── Desktop "Go" mode ─────────────────────────────────────

  // so we tile the 3 searches as popup windows in a 2x2 grid and keep
  // references to them so they can all be closed from the main page.
  function isDesktopBrowser() {
    return !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
      && window.innerWidth >= 1024;
  }
  let desktopMode = localStorage.getItem("desktopMode") === null
    ? isDesktopBrowser()
    : localStorage.getItem("desktopMode") === "true";

  function applyDesktopMode() {
    document.getElementById("desktopMode").checked = desktopMode;
    document.getElementById("btnRow").style.display = desktopMode ? "none" : "";
    document.getElementById("goRow").style.display  = desktopMode ? "" : "none";
    document.body.classList.toggle("desktop-mode", desktopMode);

  function openAll() {
    const value = document.getElementById("cardInput").value.trim();
    if (!value) { document.getElementById("cardInput").focus(); return; }
    closeAll(); // close any existing panels before opening a fresh set
    const urls = buildUrls(value);
    // Top-to-bottom: World Sold, AU Sold, Cheapest.
    const order = [
      { name: "ppGlobal", url: urls.worldwideSold }, // top
      { name: "ppAU",     url: urls.auSold },         // middle
      { name: "ppCheap",  url: urls.worldwideChea },  // bottom
    ];
    // Reserve a left strip for this app; the 3 eBay searches each take the
    // full remaining width and full screen height, cascaded by a small offset
    // so every panel's title bar stays clickable. Geometry is relative to the
    // primary monitor, so the panels never spill onto a second screen.
    const aw = screen.availWidth, ah = screen.availHeight;
    const appW = Math.min(Math.max(Math.round(aw * 0.22), 500), 720);
    const step = 36;
    const w = aw - appW - step * 2;
    const h = ah - step * 2;
    const panes = order.map((o, i) => ({ ...o, left: appW + i * step, top: i * step, w, h }));
    let blocked = false;
    // Open bottom-to-top so the World Sold panel ends up frontmost.
    [...panes].reverse().forEach(p => {
      const win = window.open(p.url, p.name,
        `popup=1,width=${p.w},height=${p.h},left=${p.left},top=${p.top}`);
      if (win) {
        // window.open won't resize/move a window it's reusing (same name), so
        // force the geometry every time to guarantee full height.
        try { win.moveTo(p.left, p.top); win.resizeTo(p.w, p.h); } catch (e) {}
        openWins[p.name] = win;
      } else {
        blocked = true;
      }
    });
    if (blocked) alert("Allow pop-ups for this site to open all three searches.");
    window.focus();
  }

  function closeAll() {
    Object.values(openWins).forEach(win => { try { win.close(); } catch (e) {} });

  // ── eBay helpers ──────────────────────────────────────────
  function isGraded(input) {
    return /\b(PSA|BGS|CGC|TAG)\s?(?:10(?:\.0)?|[1-9](?:\.[05])?)\b/i.test(input);
  }
  // Detect the grading company and build a pop-report link for it.
  function popReport(input) {
    const m = input.match(/\b(PSA|BGS|CGC|TAG)\b/i);
    if (!m) return null;
    const grader = m[1].toUpperCase();
    // Strip grader/grade and condition tokens to get a clean card query.
    const query = normalizeCardNumber(input)
      .replace(/\b(PSA|BGS|CGC|TAG)\s?(?:10(?:\.0)?|[1-9](?:\.[05])?)\b/ig, "")
      .replace(/\b(lp|nm|mp|hp|dmg)\b/ig, "")
      .replace(/\s+/g, " ").trim();
    const q = encodeURIComponent(query);
    // PSA exposes a card-search URL; the others open their pop-report page.
    const urls = {
      PSA: `https://www.psacard.com/pop/search?q=${q}`,
      BGS: `https://www.beckett.com/grading/pop-report`,
      CGC: `https://www.cgccards.com/population-report/`,
      TAG: `https://my.taggrading.com/pop-report`
    };
    return { grader, url: urls[grader] };
  }
  function normalizeCardNumber(input) {
    return input.replace(/(\d+)\s+(\d+)(?=\s|$)/, "$1/$2");
  }
  const CONDITIONS = { lp:"lightly played", nm:"near mint", mp:"moderately played", hp:"heavily played", dmg:"damaged" };
  const PRODUCTS   = { etb:"(etb,elite trainer box)", bbx:"booster box" };

  function expandConditions(input) {
    return input.replace(/\b(lp|nm|mp|hp|dmg)\b/gi, m => `(${m},${CONDITIONS[m.toLowerCase()]})`);
  }
  function expandProducts(input) {
    return input.replace(/\b(etb|bbx)\b/gi, m => PRODUCTS[m.toLowerCase()]);
  }
  function isSealedProduct(input) {
    return /\b(etb|elite trainer box|booster box|bbx|sealed|collection box|tin)\b/i.test(input);
  }
  function buildUrls(input) {
    const normalized = expandProducts(expandConditions(normalizeCardNumber(input)));
    const encoded    = encodeURIComponent(normalized);
    const gradedFlag = isGraded(input) ? "Yes" : "No";
    const base = isSealedProduct(input)
      ? `_sacat=0`
      : `_sacat=0&Graded=${gradedFlag}&_dcat=183454`;
    const binParam = excludeAuctions ? "&LH_BIN=1" : "";
    return {
      worldwideSold: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc&_sop=13${binParam}`,
      auSold:        `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1&_sop=13${binParam}`,
      worldwideChea: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_BIN=1&_sop=15`
    };
  }

  function update() {

    document.getElementById("auSoldLink").href         = urls.auSold;
    document.getElementById("worldwideCheapLink").href = urls.worldwideChea;
    if (isSealedProduct(value)) {
      statusEl.innerHTML = '<span class="status-badge sealed">📦 Sealed</span>';
    } else if (isGraded(value)) {
      const pop = popReport(value);
      statusEl.innerHTML = '<span class="status-badge graded">⚡ Graded Card</span>'

    }
    renderSuggestions();
  }

  function renderSuggestions() {
    const ci  = document.getElementById("cardInput");
    if (!ci.value.trim()) { cardLookupSeq++; document.getElementById("suggestions").innerHTML = ""; return; }

    // Instant paint: offline name list. Keeps the dropdown useful immediately
    // and is the seamless fallback if the local dataset and APIs all miss.
    paintSuggestions(null, null);

    // Pull a clean card name + collector number out of whatever was typed
    // (grader/condition/marketing noise stripped, promos and punctuation ok).
    const { name, number, total } = parseCardQuery(ci.value);
    const cores = nameCores(name);
    // Skip the search for empty input or a lone one-letter fragment — that
    // would match half the database and isn't a real card search yet.
    if (!cores.length || (cores.length === 1 && cores[0].length < 2)) { cardLookupSeq++; return; }

    // Local dataset first: a synchronous in-memory scan, no network, no rate
    // limit, no debounce needed. Covers everything as of the last
    // scripts/fetch_cards.py snapshot.
    const local = searchLocalCards(cores, number, total);
    if (local && local.length) {
      cardLookupSeq++;                 // invalidate any pending network lookup
      clearTimeout(cardLookupTimer);
      if (cardLookupCtrl) cardLookupCtrl.abort();
      paintSuggestions(local, null);
      return;
    }

    // Nothing local (new set released after the snapshot, dataset not yet
    // generated, or a genuinely unmatched query) — fall back to the live,
    // debounced network chain (pokemontcg.io, then TCGdex).
    liveCardLookup(name, number, total);
  }

  // ── Local card dataset (cards.js) ──────────────────────────
  // Scans the bundled CARDS snapshot in memory: zero network, zero rate
  // limit. Returns null when the dataset hasn't loaded/been generated yet, so
  // the caller falls through to the live API untouched.
  function searchLocalCards(cores, number, total) {
    if (typeof CARDS === "undefined" || !CARDS.length) return null;
    const numLower = (number || "").toLowerCase();
    const results = [];
    for (let i = 0; i < CARDS.length; i++) {
      const c = CARDS[i];
      const nameLower = c[5];
      let ok = true;
      for (let j = 0; j < cores.length; j++) {
        if (nameLower.indexOf(cores[j]) === -1) { ok = false; break; }
      }
      if (!ok) continue;
      if (numLower) {
        const cn = String(c[1]).toLowerCase();
        if (total) {
          if (!cn.startsWith(numLower) || String(c[2]) !== total) continue;
        } else if (/^\d+$/.test(numLower)) {
          if (!(cn.startsWith(numLower) || String(c[2]) === numLower)) continue;
        } else if (!cn.startsWith(numLower)) {
          continue;
        }
      }
      results.push(c);
      if (results.length >= 300) break; // cap the scan; sorted slice below trims further
    }
    results.sort((a, b) => (b[4] || "").localeCompare(a[4] || "")); // newest set first
    return results.slice(0, 12).map(c => ({
      name: c[0],
      num:  c[2] ? `${c[1]}/${c[2]}` : c[1],
      set:  c[3],
      src:  "",
    }));
  }

  // Turn raw input like "PSA 10 Charizard ex 125/197 reverse holo" into
  // { name: "charizard ex", number: "125", total: "197" }. Best-effort and
  // forgiving — it never throws, so a weird query just yields a looser search.
  function parseCardQuery(raw) {
    let s = (raw || "").toLowerCase()
      // Grading company + grade (PSA 10, BGS 9.5, CGC 8 …).
      .replace(/\b(psa|bgs|cgc|sgc|tag)\s*\.?\s*(?:10(?:\.0)?|[1-9](?:\.[05])?)\b/g, " ")
      // Condition shorthand and common marketing words.
      .replace(/\b(gem\s*mint|mint|near\s*mint|nm|lightly\s*played|lp|moderately\s*played|mp|heavily\s*played|hp|damaged|dmg|raw|graded|sealed)\b/g, " ")
      .replace(/\b(1st\s*ed(?:ition)?|first\s*ed(?:ition)?|shadowless|unlimited|reverse\s*holo|rev\s*holo|holo(?:foil)?|foil|promo|full\s*art|alt(?:ernate)?\s*art|secret\s*rare)\b/g, " ")
      .replace(/#/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    if (!s) return { name: "", number: "", total: "" };
    const tokens = s.split(" ");
    const numIdx = tokens.findIndex(isNumberToken);
    if (numIdx === -1) return { name: s, number: "", total: "" };
    const name = tokens.slice(0, numIdx).join(" ").trim();
    // Split the collector token into number + set total, e.g. "125/197",
    // "197", "swsh050". When there's no slash the single value is ambiguous
    // (could be either), which the query builder handles by searching both.
    const tok = tokens.slice(numIdx).join("");
    const m   = tok.match(/^([a-z]*\d+[a-z]?)(?:\/(\d+))?/);
    return { name, number: m ? m[1] : "", total: (m && m[2]) || "" };
  }

  // A collector-number token: pure numbers (4, 125, 125/197) or short
  // alpha-prefixed promos (SWSH284, TG20, GG70, H31). Names like "ex", "vmax",
  // "porygon2" deliberately do NOT match so they stay part of the name.
  function isNumberToken(t) {
    return /^\d+[a-z]?(?:\/\d+)?$/.test(t) || /^[a-z]{1,5}\d+[a-z]?(?:\/\d+)?$/.test(t);
  }

  // Break a name into lowercase alphanumeric "cores" for wildcard matching.
  // Splits on spaces AND punctuation ("Ho-Oh" → ho, oh; "Mr. Mime" → mr, mime)
  // so hyphens/dots/apostrophes never block a match. Sub-words shorter than 2
  // chars are dropped except the final one (the prefix the user is still typing).
  function nameCores(name) {
    const words = (name || "").trim().split(/\s+/).filter(Boolean);
    const cores = [];
    words.forEach((w, wi) => {
      const subs = w.split(/[^\p{L}\p{N}]+/u).filter(Boolean);
      subs.forEach((sub, si) => {
        const isFinal = wi === words.length - 1 && si === subs.length - 1;
        if (sub.length >= 2 || isFinal) cores.push(sub.toLowerCase());
      });
    });
    return cores;
  }

  // ── Dropdown painter ──────────────────────────────────────
  // One place builds the dropdown: the live API results, or the offline name
  // list when there are none (also the seamless fallback if the APIs are slow,
  // empty, or down). apiResults: array to show, or null for the offline list.
  // seq: null for the instant paint, or the lookup's seq for async paints (a
  // stale async paint is dropped so it can't overwrite newer input).
  function paintSuggestions(apiResults, seq) {
    if (seq !== null && seq !== cardLookupSeq) return;
    const ci  = document.getElementById("cardInput");
    const box = document.getElementById("suggestions");
    box.innerHTML = "";
    if (apiResults && apiResults.length) {
      apiResults.forEach(r => box.appendChild(makeCardRow(r)));
    } else {
      appendOfflineNames(box, ci.value);
    }
  }

  // Cheap, offline last-word autocomplete over the bundled species/trainer
  // name lists. Appends to the box (does not clear it).
  function appendOfflineNames(box, raw) {
    const lastWord = raw.split(/\s+/).pop().toLowerCase();
    if (!lastWord) return;
    const prefix = raw.slice(0, raw.length - lastWord.length);
    ALL_NAMES
      .filter(x => x.toLowerCase().startsWith(lastWord))
      .slice(0, 10)
      .forEach(item => {
        const div = document.createElement("div");
        div.innerText = item;
        div.dataset.fill = prefix + item;          // keep earlier names intact
        div.onmousedown = e => e.preventDefault();
        div.onclick = () => fillFromSuggestion(prefix + item);
        box.appendChild(div);
      });
  }

  function makeCardRow(r) {
    const fill = `${r.name} ${r.num}`;
    const div = document.createElement("div");
    div.className = "card-sug";
    div.dataset.fill = fill;
    div.innerHTML =
      `<span class="sug-name">${escapeHtml(r.name)}</span>`
      + `<span class="sug-meta"><span class="sug-num">${escapeHtml(r.num)}</span>`
      + (r.set ? ` · ${escapeHtml(r.set)}` : "")
      + (r.src === "intl" ? ` <span class="sug-src">intl</span>` : "")
      + `</span>`;
    div.onmousedown = e => e.preventDefault();
    div.onclick = () => fillFromSuggestion(fill);
    return div;
  }

  // Drop a suggestion into the box, run the app, and close the dropdown —
  // cancelling any in-flight lookup so it can't re-open the menu after select.
  function fillFromSuggestion(value) {
    const ci = document.getElementById("cardInput");
    ci.value = value;
    update();
    cardLookupSeq++;                 // invalidate the lookup update() just queued
    clearTimeout(cardLookupTimer);
    document.getElementById("suggestions").innerHTML = "";
    ci.focus();
    ci.setSelectionRange(ci.value.length, ci.value.length);
  }

  // ── Live card lookup (pokemontcg.io) ──────────────────────
  // Debounced, server-side filtered autocomplete on name (+ optional collector
  // number), so "charizard 12" lists Charizards numbered 12*, "blaine" lists
  // every Blaine card, and "blaine's c" narrows to Blaine's Charizard — each
  // with its full "number/printedTotal · set" string for eBay comps.
  let cardLookupSeq   = 0;     // bumps to drop stale/aborted responses
  let cardLookupTimer = null;
  let cardLookupCtrl  = null;  // AbortController for the pending fetch
  const cardCache = new Map(); // q -> results, so repeats don't refetch

  function liveCardLookup(name, number, total) {
    const seq = ++cardLookupSeq;
    const cores = nameCores(name);
    const q = buildPtcgQuery(cores, number, total);
    if (!q) { paintSuggestions(null, seq); return; }
    if (cardCache.has(q)) { paintSuggestions(cardCache.get(q), seq); return; }

    clearTimeout(cardLookupTimer);
    cardLookupTimer = setTimeout(() => {
      if (cardLookupCtrl) cardLookupCtrl.abort();
      cardLookupCtrl = new AbortController();
      const signal = cardLookupCtrl.signal;
      // Primary: pokemontcg.io (exact "number/total · set"). If it errors OR
      // finds nothing, fall through to TCGdex (broader / Japanese-origin sets).
      // So either API can be down and the other still answers.
      let ptcgFailed = false;
      fetchPtcg(q, signal)
        .catch(err => {
          if (err && err.name === "AbortError") throw err; // superseded — bubble up
          ptcgFailed = true;
          return [];
        })
        .then(results => results.length ? results : fetchTcgdex(cores, number, signal))
        .then(results => {
          // Don't cache a transient failure as an authoritative empty result.
          if (results.length || !ptcgFailed) cardCache.set(q, results);
          // results may be []; paintSuggestions then shows saved + offline + save.
          paintSuggestions(results, seq);
        })
        .catch(err => {
          if (err && err.name === "AbortError") return; // superseded by a newer keystroke
          // Any other failure is swallowed entirely — fall back to the offline
          // view (saved cards + names + save action); the app is untouched.
          paintSuggestions(null, seq);
        });
    }, 180);
  }

  // AND of per-word PREFIX wildcards so word order and extras don't matter:
  // "dark charizard", "charizard ex", "ex charizard" and "reshiram charizard"
  // (→ Reshiram & Charizard-GX) all match, because the engine matches each
  // word-token. Prefix (name:x*) is ~5x faster than a leading wildcard
  // (name:*x*); the only thing given up is mid-word matches like "zard". Cores
  // are alphanumeric, so nothing needs Lucene-escaping.
  function buildPtcgQuery(cores, number, total) {
    const clauses = cores.map(c => `name:${c}*`);
    if (number && total) {
      // Full "125/197": collector number 125 in a 197-card set — precise.
      clauses.push(`number:${number}* set.printedTotal:${total}`);
    } else if (number && /^\d+$/.test(number)) {
      // Bare numeric "197": could be the collector number OR the set total
      // ("125/197"), so match either — covers typing the denominator you see.
      clauses.push(`(number:${number}* OR set.printedTotal:${number})`);
    } else if (number) {
      // Alphanumeric promo ("SWSH050", "TG20") — only the collector number.
      clauses.push(`number:${number}*`);
    }
    return clauses.join(" ");
  }

  function fetchPtcg(q, signal) {
    const url = "https://api.pokemontcg.io/v2/cards?pageSize=12&orderBy=-set.releaseDate"
      + "&select=id,name,number,set&q=" + encodeURIComponent(q);
    const headers = POKEMONTCG_API_KEY ? { "X-Api-Key": POKEMONTCG_API_KEY } : {};
    return fetch(url, { signal, headers })
      .then(r => r.ok ? r.json() : Promise.reject(new Error("ptcg " + r.status)))
      .then(j => (j.data || []).map(c => ({
        name: c.name,
        num:  (c.set && c.set.printedTotal) ? `${c.number}/${c.set.printedTotal}` : c.number,
        set:  c.set ? c.set.name : "",
        src:  "",
      })));
  }

  // TCGdex English fallback — covers sets pokemontcg.io misses (incl. many
  // Japanese-origin cards). Server-side filter on the longest name word, then
  // refine client-side by every word + number. Self-contained: any failure
  // resolves to [] so it can never break the primary flow.
  function fetchTcgdex(cores, number, signal) {
    const key = cores.slice().sort((a, b) => b.length - a.length)[0];
    if (!key || key.length < 2) return Promise.resolve([]);
    return fetch("https://api.tcgdex.net/v2/en/cards?name=" + encodeURIComponent(key), { signal })
      .then(r => r.ok ? r.json() : [])
      .then(list => {
        if (!Array.isArray(list)) return [];
        const num = (number || "").toLowerCase();
        const matched = list.filter(c => {
          const n = (c.name || "").toLowerCase();
          return cores.every(core => n.includes(core))
            && (!num || String(c.localId).toLowerCase().startsWith(num));
        }).slice(0, 15);
        // Enrich each with set name + total (best-effort, cached per set).
        return Promise.all(matched.map(c =>
          tcgdexSetInfo(setIdOf(c.id), signal).then(si => ({
            name: c.name,
            num:  (si && si.total) ? `${c.localId}/${si.total}` : String(c.localId),
            set:  (si && si.name) ? si.name : "",
            src:  "intl",
          }))
        ));
      })
      .catch(() => []);
  }

  function setIdOf(id) { return String(id || "").replace(/-[^-]*$/, ""); }
  const tcgdexSetCache = new Map();
  function tcgdexSetInfo(setId, signal) {
    if (!setId) return Promise.resolve(null);
    if (tcgdexSetCache.has(setId)) return Promise.resolve(tcgdexSetCache.get(setId));
    return fetch("https://api.tcgdex.net/v2/en/sets/" + encodeURIComponent(setId), { signal })
      .then(r => r.ok ? r.json() : null)
      .then(s => {
        const info = s ? { name: s.name, total: s.cardCount && (s.cardCount.official || s.cardCount.total) } : null;
        tcgdexSetCache.set(setId, info);
        return info;
      })
      .catch(() => null);
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function clearInput() {
    const input = document.getElementById("cardInput");
    input.value = "";
    input.focus();
    document.getElementById("suggestions").innerHTML = "";
    document.getElementById("status").innerHTML = "";
    localStorage.setItem("lastCard", "");
    closeAll(); // clearing the box closes any open panels
  }

  document.addEventListener("click", e => {
    if (!document.querySelector(".input-wrap").contains(e.target))
      document.getElementById("suggestions").innerHTML = "";
  });

  // ── Trading Out ───────────────────────────────────────────
  let tradeItems = JSON.parse(localStorage.getItem("tradeItems") || "[]");

  function saveTrade() { localStorage.setItem("tradeItems", JSON.stringify(tradeItems)); }

  function addTradeItem() {
    tradeItems.push({ id: Date.now(), name: "Trade-Out Item", price: 0 });
    saveTrade();
    renderComp();
    setTimeout(() => {
      const inputs = document.querySelectorAll(".trade-name-input");
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 0);
  }

  function deleteTrade(id) {
    tradeItems = tradeItems.filter(x => x.id !== id);
    saveTrade();
    renderComp();
  }

  function toggleTradeExclude(id) {
    const item = tradeItems.find(x => x.id === id);
    if (!item) return;
    item.excluded = !item.excluded;
    saveTrade();
    renderComp();
  }

  function updateTradeField(id, field, val) {
    const item = tradeItems.find(x => x.id === id);
    if (!item) return;
    if (field === "name")  item.name  = val;
    if (field === "price") item.price = cleanNum(val);
    saveTrade();
    refreshSettlement();
  }

  function refreshSettlement() {
    const tradeTotal  = tradeItems.filter(x => !x.excluded).reduce((s, x) => s + x.price, 0);
    const payoutTotal = compItems.filter(x => !x.excluded).reduce((s, x) => s + x.price * (x.pct / 100), 0);
    const diff = tradeTotal - payoutTotal;

    const tEl = document.getElementById("tradeTotalVal");
    if (tEl) {
      tEl.textContent = `$${fmtUSD(tradeTotal)}`;
      tEl.closest(".subtotal-row").style.display = tradeTotal > 0.005 ? "" : "none";
    }

    const ctEl = document.getElementById("compTrade");
    const ctRow = document.getElementById("compTradeRow");
    if (ctEl && ctRow) {
      ctEl.textContent = `$${fmtUSD(tradeTotal)}`;
      ctRow.style.display = tradeTotal > 0.005 ? "" : "none";
    }

    const sEl = document.getElementById("settlementResult");
    const sDivider = document.getElementById("settlementDivider");
    if (!sEl) return;

    const hasValue = tradeTotal > 0.005 || payoutTotal > 0.005;
    sEl.style.display = hasValue ? "" : "none";
    if (sDivider) sDivider.style.display = hasValue ? "" : "none";
    if (!hasValue) return;

    const isEven = Math.abs(diff) < 0.005 && tradeTotal > 0.005 && payoutTotal > 0.005;
    if (isEven) {
      sEl.className = "settlement-result even-trade";
      sEl.innerHTML = `<span class="r-label"><span class="total-op">=</span>Direct Trade</span><span class="r-val">Even</span>`;
    } else if (diff > 0.005) {
      sEl.className = "settlement-result pay-customer";
      sEl.innerHTML = `<span class="r-label"><span class="total-op">=</span>Customer to Pay</span><span class="r-val">$${fmtUSD(diff)}</span>`;
    } else {
      sEl.className = "settlement-result pay-vendor";
      sEl.innerHTML = `<span class="r-label"><span class="total-op">=</span>Vendor to Pay</span><span class="r-val">$${fmtUSD(Math.abs(diff))}</span>`;
    }
  }

  // ── Comp list ─────────────────────────────────────────────
  let compItems = JSON.parse(localStorage.getItem("compItems") || "[]");
  let headerPct = 80;

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmtUSD(n) {
    return n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtInt(n) {
    return Math.round(n).toLocaleString("en-US");
  }
  function cleanNum(s) {
    return parseFloat(String(s).replace(/,/g, "")) || 0;
  }
  function formatPriceInput(el) {
    const digits = el.value.replace(/[^\d]/g, "");
    el.value = digits ? Number(digits).toLocaleString("en-US") : "";
  }
  function saveComp() { localStorage.setItem("compItems", JSON.stringify(compItems)); }

  function addToComp() {
    const label = document.getElementById("cardInput").value.trim();
    const raw   = document.getElementById("priceInput").value;
    const price = cleanNum(raw);
    if (!label || raw === "") return;
    compItems.push({ id: Date.now(), label, price, pct: headerPct });
    saveComp();
    renderComp();
    document.getElementById("priceInput").value = "";
  }

  function cascadePct(val) {
    const newPct = parseInt(val) || 100;
    const isMixed = new Set(compItems.map(x => x.pct)).size > 1;
    if (isMixed && !confirm(`Some items have different payout rates. Set all ${compItems.length} items to ${newPct}%?`)) {
      renderComp();
      return;
    }
    headerPct = newPct;
    compItems.forEach(x => x.pct = headerPct);
    saveComp();
    renderComp();
  }

  function deleteComp(id) {
    compItems = compItems.filter(x => x.id !== id);
    saveComp();
    renderComp();
  }

  function toggleCompExclude(id) {
    const item = compItems.find(x => x.id === id);
    if (!item) return;
    item.excluded = !item.excluded;
    saveComp();
    renderComp();
  }

  function saveAndClearComp() {
    if (compItems.length > 0 || tradeItems.length > 0) {
      savedComps.unshift({
        id: Date.now(),
        label: topCompLabel(compItems),
        compItems: JSON.parse(JSON.stringify(compItems)),
        tradeItems: JSON.parse(JSON.stringify(tradeItems))
      });
      savedComps.length = Math.min(savedComps.length, 5);
      saveSavedComps();
    }
    compItems = [];
    tradeItems = [];
    saveComp();
    saveTrade();
    renderComp();
  }

  // ── Saved comp sets (queue of last 5, surfaced as tabs) ──
  // Selecting a tab loads that set straight into the active editor — pre-filled
  // and fully editable (add/remove items) — same as starting a new comp.
  let savedComps = JSON.parse(localStorage.getItem("savedComps") || "[]");

  function saveSavedComps() { localStorage.setItem("savedComps", JSON.stringify(savedComps)); }

  function topCompLabel(items) {
    if (!items || items.length === 0) return "Empty Set";
    const top = items.reduce((a, b) => (!a || b.price > a.price) ? b : a, null);
    return top.label;
  }

  function selectSavedTab(id) {
    const set = savedComps.find(s => s.id === id);
    if (!set) return;
    compItems  = JSON.parse(JSON.stringify(set.compItems));
    tradeItems = JSON.parse(JSON.stringify(set.tradeItems));
    headerPct  = compItems.length ? compItems[0].pct : 100;
    savedComps = savedComps.filter(s => s.id !== id);
    saveComp();
    saveTrade();
    saveSavedComps();
    renderComp();
  }

  function clearSavedComps() {
    if (savedComps.length === 0) return;
    if (!confirm("Clear all recent comp sets? This cannot be undone.")) return;
    savedComps = [];
    saveSavedComps();
    renderSavedTabs();
  }

  function renderSavedTabs() {
    const section = document.getElementById("savedTabsSection");
    if (compItems.length > 0 || tradeItems.length > 0 || savedComps.length === 0) {
      section.innerHTML = "";
      return;
    }

    const tabs = savedComps.map(s => `
      <button class="saved-tab" onclick="selectSavedTab(${s.id})" title="Continue ${escHtml(s.label)}">
        ${escHtml(s.label)}
      </button>`).join("");

    section.innerHTML = `
      <hr class="divider">
      <div class="section-block">
        <div class="block-hdr">
          <span class="section-label">Recent Comp Sets</span>
          <button class="icon-add-btn" onclick="clearSavedComps()" title="Clear all recent comp sets">×</button>
        </div>
        <div class="saved-tabs">${tabs}</div>
      </div>`;
  }

  function updateCompField(id, field, val) {
    const item = compItems.find(x => x.id === id);
    if (!item) return;
    if (field === "price") item.price = cleanNum(val);
    if (field === "pct")   item.pct   = parseInt(val)   || 100;
    saveComp();
    const m = compItems.filter(x => !x.excluded).reduce((s, x) => s + x.price, 0);
    const p = compItems.filter(x => !x.excluded).reduce((s, x) => s + x.price * (x.pct / 100), 0);
    const em = document.getElementById("compMarket");
    const ep = document.getElementById("compPayout");
    const er = document.getElementById("compRate");
    if (em) em.textContent = `$${fmtUSD(m)}`;
    if (ep) ep.textContent = `$${fmtUSD(p)}`;
    if (er) er.textContent = `${(m > 0.005 ? (p / m * 100) : headerPct).toFixed(1)}%`;
    refreshSettlement();
  }

  function renderComp() {
    const section = document.getElementById("compSection");
    if (compItems.length === 0 && tradeItems.length === 0) { section.innerHTML = ""; renderSavedTabs(); return; }

    const marketTotal = compItems.filter(x => !x.excluded).reduce((s, x) => s + x.price, 0);
    const payoutTotal = compItems.filter(x => !x.excluded).reduce((s, x) => s + x.price * (x.pct / 100), 0);
    const tradeTotal  = tradeItems.filter(x => !x.excluded).reduce((s, x) => s + x.price, 0);
    const diff = tradeTotal - payoutTotal;

    const pctOpts = v => [100,95,90,85,80,75,70,65,60,55,50]
      .map(p => `<option value="${p}"${p===v?' selected':''}>${p}%</option>`).join("");

    const headerOpts = [100,95,90,85,80,75,70,65,60,55,50]
      .map(p => `<option value="${p}"${p===headerPct?' selected':''}>${p}%</option>`).join("");

    // ── Trade-out rows ──
    const tradeRows = tradeItems.map(item => `
      <tr class="item-row${item.excluded ? ' excluded' : ''}">
        <td class="card-label">
          <input class="trade-name-input" type="text"
            placeholder="Item name"
            value="${escHtml(item.name)}"
            onfocus="this.select()"
            oninput="updateTradeField(${item.id},'name',this.value)"
            onchange="updateTradeField(${item.id},'name',this.value)" />
        </td>
        <td>
          <span class="price-cell">
            <span class="price-cell-dollar">$</span>
            <input class="comp-price-input" type="text" inputmode="numeric"
              value="${item.price > 0 ? fmtInt(item.price) : ''}"
              placeholder="0"
              oninput="formatPriceInput(this); updateTradeField(${item.id},'price',this.value)"
              onchange="updateTradeField(${item.id},'price',this.value)" />
          </span>
        </td>
        <td class="row-actions">
          <button class="strike-btn${item.excluded ? ' active' : ''}" onclick="toggleTradeExclude(${item.id})" title="${item.excluded ? 'Include in calculation' : 'Exclude from calculation'}">${item.excluded ? '↺' : '⊘'}</button>
          <button class="del-btn" onclick="deleteTrade(${item.id})" title="Remove">×</button>
        </td>
      </tr>`).join("");

    const tradeBodyHtml = tradeItems.length > 0 ? `
      <table class="comp-table">
        <thead><tr>
          <th>Item</th>
          <th>Value</th>
          <th></th>
        </tr></thead>
        <tbody>${tradeRows}</tbody>
      </table>
      <div class="subtotal-row" style="${tradeTotal > 0.005 ? '' : 'display:none'}">
        <span class="subtotal-label">Vendor's Items Value</span>
        <span class="subtotal-val orange" id="tradeTotalVal">$${fmtUSD(tradeTotal)}</span>
      </div>` : "";

    // ── Comp rows ──
    const compRows = compItems.map(item => `
      <tr class="item-row${item.excluded ? ' excluded' : ''}">
        <td class="card-label">${escHtml(item.label)}</td>
        <td>
          <span class="price-cell">
            <span class="price-cell-dollar">$</span>
            <input class="comp-price-input" type="text" inputmode="numeric"
              value="${item.price > 0 ? fmtInt(item.price) : ''}"
              placeholder="0"
              oninput="formatPriceInput(this); updateCompField(${item.id},'price',this.value)"
              onchange="updateCompField(${item.id},'price',this.value)" />
          </span>
        </td>
        <td>
          <select class="comp-pct-select" onchange="updateCompField(${item.id},'pct',this.value)">
            ${pctOpts(item.pct)}
          </select>
        </td>
        <td class="row-actions">
          <button class="strike-btn${item.excluded ? ' active' : ''}" onclick="toggleCompExclude(${item.id})" title="${item.excluded ? 'Include in calculation' : 'Exclude from calculation'}">${item.excluded ? '↺' : '⊘'}</button>
          <button class="del-btn" onclick="deleteComp(${item.id})" title="Remove">×</button>
        </td>
      </tr>`).join("");

    const compBodyHtml = compItems.length > 0 ? `
        <table class="comp-table">
          <thead><tr>
            <th>Card</th>
            <th>Price</th>
            <th>Offer</th>
            <th></th>
          </tr></thead>
          <tbody>${compRows}</tbody>
        </table>
        <div class="comp-totals">
          <div class="total-row market">
            <span class="total-label">Customer's Items Value</span>
            <span class="total-val" id="compMarket">$${fmtUSD(marketTotal)}</span>
          </div>
          <div class="total-row rate">
            <span class="total-label"><span class="total-op">&times;</span>Effective Payout Rate</span>
            <span class="total-val" id="compRate">${(marketTotal > 0.005 ? (payoutTotal / marketTotal * 100) : headerPct).toFixed(1)}%</span>
          </div>
          <hr class="total-sep">
          <div class="total-row payout">
            <span class="total-label"><span class="total-op">=</span>Customer's Items Payout</span>
            <span class="total-val" id="compPayout">$${fmtUSD(payoutTotal)}</span>
          </div>
          <div class="total-row trade" id="compTradeRow" style="${tradeTotal > 0.005 ? '' : 'display:none'}">
            <span class="total-label"><span class="total-op">&minus;</span>Vendor's Items Value</span>
            <span class="total-val" id="compTrade">$${fmtUSD(tradeTotal)}</span>
          </div>
        </div>` : "";

    // ── Settlement ──
    // diff = tradeOut - payoutOffer
    // positive → customer pays (they're getting more than they gave)
    // negative → vendor pays (they owe more cash on top of the trade)
    // zero with both values → direct trade; zero with no trade → vendor pays full payout
    const hasValue = tradeTotal > 0.005 || payoutTotal > 0.005;
    let settlementClass, settlementLabel, settlementVal;
    const isEven = Math.abs(diff) < 0.005 && tradeTotal > 0.005 && payoutTotal > 0.005;
    if (isEven) {
      settlementClass = "even-trade";
      settlementLabel = "Direct Trade";
      settlementVal   = "Even";
    } else if (diff > 0.005) {
      settlementClass = "pay-customer";
      settlementLabel = "Customer to Pay";
      settlementVal   = `$${fmtUSD(diff)}`;
    } else {
      settlementClass = "pay-vendor";
      settlementLabel = "Vendor to Pay";
      settlementVal   = `$${fmtUSD(Math.abs(diff))}`;
    }

    section.innerHTML = `
      <hr class="divider">

      <!-- Vendor Items -->
      <div class="section-block">
        <div class="block-hdr">
          <span class="section-label">Vendor's Items (${tradeItems.length} ${tradeItems.length === 1 ? "Item" : "Items"}${tradeItems.some(x=>x.excluded) ? `, ${tradeItems.filter(x=>x.excluded).length} excluded` : ""})</span>
          <button class="icon-add-btn" onclick="addTradeItem()" title="Add item">+</button>
        </div>
        ${tradeBodyHtml}
      </div>

      <hr class="divider">

      <!-- Customer Items -->
      <div class="section-block">
        <div class="block-hdr">
          <span class="section-label">Customer's Items (${compItems.length} ${compItems.length === 1 ? "Item" : "Items"}${compItems.some(x=>x.excluded) ? `, ${compItems.filter(x=>x.excluded).length} excluded` : ""})</span>
          <select class="comp-pct-select" onchange="cascadePct(this.value)" title="Apply % to all">
            <option value="100">% All</option>
            ${headerOpts}
          </select>
        </div>
        ${compBodyHtml}
      </div>

      <hr class="divider" id="settlementDivider" style="${hasValue ? '' : 'display:none'}">

      <div class="settlement-result ${settlementClass}" id="settlementResult" style="${hasValue ? '' : 'display:none'}">
        <span class="r-label"><span class="total-op">=</span>${settlementLabel}</span>
        <span class="r-val">${settlementVal}</span>
      </div>

      <button class="clear-all-btn" onclick="saveAndClearComp()">Save &amp; Clear</button>`;

    renderSavedTabs();
  }

  window.onload = () => { renderComp(); renderSavedTabs(); };
</script>
</body>
</html>
