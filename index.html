<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokemon eBay Smart Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      width: 92%;
      max-width: 820px;
      background: #111;
      border: 1px solid #222;
      padding: 28px;
      border-radius: 14px;
      margin: 20px 0 80px;
    }

    /* ── eBay buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn-row a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-align: center;
      padding: 16px 8px;
      min-height: 60px;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      transition: filter 0.15s;
    }
    .btn-row a:hover { filter: brightness(1.15); }
    .btn-row a .btn-sub {
      font-size: 10px;
      font-weight: normal;
      opacity: 0.75;
    }
    .btn-sold  { background: #1a56a0; }
    .btn-cheap { background: #1a7a3c; }

    /* ── Input row ── */
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-wrap {
      position: relative;
      width: 100%;
    }
    .comp-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="text"], input:not([type]) {
      width: 100%;
      padding: 16px 42px 16px 16px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }
    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #444;
      border: none;
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
    }
    .clear-btn:hover { background: #666; }

    /* ── Price input ── */
    .price-wrap {
      position: relative;
      flex-shrink: 0;
      width: 110px;
    }
    .price-wrap input[type="number"] {
      width: 100%;
      padding: 16px 10px 16px 26px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
      box-sizing: border-box;
      -moz-appearance: textfield;
    }
    .price-wrap input[type="number"]::-webkit-outer-spin-button,
    .price-wrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .price-prefix {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 16px;
      pointer-events: none;
    }

    /* ── Percentage dropdown ── */
    .pct-select {
      flex-shrink: 0;
      height: 52px;
      padding: 0 10px;
      background: #1e1e1e;
      color: white;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    /* ── Add to Comp button ── */
    .add-comp-btn {
      flex: 1;
      padding: 0 14px;
      height: 52px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.15s;
    }
    .add-comp-btn:hover { filter: brightness(1.15); }

    /* ── Autocomplete ── */
    .suggestions {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      background: #2a2a2a;
      border-radius: 10px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 10;
    }
    .suggestions div {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }
    .suggestions div:hover { background: #444; }

    /* ── Status ── */
    .status { margin-top: 14px; font-size: 13px; color: #6cf; text-align: center; }

    /* ── Comp table ── */
    .comp-section {
      margin-top: 22px;
      border-top: 1px solid #2a2a2a;
      padding-top: 16px;
    }
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .comp-table th {
      text-align: left;
      color: #666;
      font-weight: normal;
      font-size: 12px;
      padding: 4px 8px 8px;
      border-bottom: 1px solid #2a2a2a;
    }
    .comp-table td {
      padding: 8px;
      border-bottom: 1px solid #1e1e1e;
      vertical-align: middle;
    }
    .comp-table td.card-label {
      word-break: break-word;
    }
    .comp-price-input {
      background: #1e1e1e;
      border: 1px solid #333;
      color: white;
      border-radius: 6px;
      padding: 6px 10px 6px 22px;
      font-size: 14px;
      width: 90px;
      box-sizing: border-box;
      -moz-appearance: textfield;
    }
    .comp-price-input::-webkit-outer-spin-button,
    .comp-price-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .price-cell { position: relative; display: inline-block; }
    .price-cell-dollar {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 13px;
      pointer-events: none;
    }
    .del-btn {
      background: #2a2a2a;
      border: none;
      color: #f87171;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.1s;
    }
    .del-btn:hover { background: #4a1212; }
    .comp-total-row td {
      padding-top: 12px;
      font-weight: bold;
      color: #6cf;
      font-size: 15px;
      border-bottom: none;
    }
    .comp-pct-select {
      background: #1e1e1e;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      width: 70px;
    }

    .clear-all-btn {
      margin-top: 12px;
      background: #3a1010;
      color: #f87171;
      border: 1px solid #5a2020;
      padding: 9px 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      transition: background 0.15s;
    }
    .clear-all-btn:hover { background: #5a1818; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .header img {
      height: 48px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    /* ── Mobile ── */
    @media(max-width: 600px) {
      body {
        align-items: flex-end;
        padding-bottom: 10px;
        box-sizing: border-box;
      }
      .box {
        width: 100%;
        max-width: 100%;
        border-radius: 14px;
        padding: 18px 16px 24px;
        margin: 0;
      }
      .btn-row { grid-template-columns: 1fr 1fr 1fr; }
      .btn-row a { font-size: 11px; padding: 16px 4px; }
      .btn-row a .btn-sub { font-size: 9px; }
      .input-row { flex-wrap: wrap; }
      .input-wrap { flex: 1 1 100%; }
      .price-wrap { flex: 1; }
      .add-comp-btn { flex: 1; }
    }
  </style>
</head>

<div class="box">

    <h2>Pokemon Comps Tool</h2>

        <option value="55">55%</option>
        <option value="50">50%</option>
      </select>
      <button class="add-comp-btn" onclick="addToComp()">Add to Comp</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div id="compSection"></div>

</div>

  // ── eBay helpers ──────────────────────────────────────────
  function isGraded(input) {
    return /\b(PSA|BGS|CGC|TAG)\s?(?:10(?:\.0)?|[1-9](?:\.[05])?)\b/i.test(input);
  }
  function normalizeCardNumber(input) {
    return input.replace(/(\d+)\s+(\d+)(?=\s|$)/, "$1/$2");
  }
  const CONDITIONS = { lp:"lightly played", nm:"near mint", mp:"moderately played", hp:"heavily played", dmg:"damaged" };
  function expandConditions(input) {
    return input.replace(/\b(lp|nm|mp|hp|dmg)\b/gi, m => `(${m},${CONDITIONS[m.toLowerCase()]})`);
  }
  function buildUrls(input) {
    const normalized = expandConditions(normalizeCardNumber(input));
    const encoded = encodeURIComponent(normalized);
    const gradedFlag = isGraded(input) ? "Yes" : "No";
    const base = `_sacat=0&Graded=${gradedFlag}&_dcat=183454`;
    return {
      worldwideSold: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc`,
      auSold:        `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_Sold=1&LH_Complete=1&rt=nc&LH_PrefLoc=1`,
      worldwideChea: `https://www.ebay.com.au/sch/i.html?_nkw=${encoded}&${base}&LH_BIN=1&_sop=15`
    };
  }

  function update() {
    const value = document.getElementById("cardInput").value.trim();
    if (!value) return;
    const urls = buildUrls(value);
    document.getElementById("worldwideSoldLink").href  = urls.worldwideSold;
    document.getElementById("auSoldLink").href         = urls.auSold;
    document.getElementById("worldwideCheapLink").href = urls.worldwideChea;
    document.getElementById("status").innerText = isGraded(value) ? "Graded Mode Detected" : "Raw Mode";
    renderSuggestions();
  }

  function renderSuggestions() {
    const input = document.getElementById("cardInput").value.toLowerCase();
    const box = document.getElementById("suggestions");
    box.innerHTML = "";
    if (!input) return;
    [...POKEMON_NAMES, ...TRAINER_NAMES]
      .filter(x => x.toLowerCase().startsWith(input))
      .slice(0, 10)
      .forEach(item => {
        const div = document.createElement("div");
        div.innerText = item;
        div.onmousedown = e => e.preventDefault();
        div.onclick = () => {
          const ci = document.getElementById("cardInput");
          ci.value = item;
          update();
          box.innerHTML = "";
          ci.focus();
          ci.setSelectionRange(ci.value.length, ci.value.length);
        };
        box.appendChild(div);
      });
  }

  function clearInput() {
    const input = document.getElementById("cardInput");
    input.value = "";
    input.focus();
    document.getElementById("suggestions").innerHTML = "";
  }

  document.addEventListener("click", e => {
    if (!document.querySelector(".input-wrap").contains(e.target))
      document.getElementById("suggestions").innerHTML = "";
  });

  // ── Comp table ───────────────────────────────────────────
  let compItems = JSON.parse(localStorage.getItem("compItems") || "[]");

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function saveComp() {
    localStorage.setItem("compItems", JSON.stringify(compItems));
  }

  function addToComp() {
    const label = document.getElementById("cardInput").value.trim();
    const raw   = document.getElementById("priceInput").value;
    const price = parseFloat(raw);
    const pct   = parseInt(document.getElementById("pctSelect").value) || 100;
    if (!label || raw === "" || isNaN(price) || price < 0) return;
    compItems.push({ id: Date.now(), label, price, pct });
    saveComp();
    renderComp();
    document.getElementById("priceInput").value = "";
    document.getElementById("pctSelect").selectedIndex = 0;
  }

  function deleteComp(id) {
    compItems = compItems.filter(x => x.id !== id);
    saveComp();
    renderComp();
  }

  function clearAllComp() {
    compItems = [];
    saveComp();
    renderComp();
  }

  function updateCompField(id, field, val) {
    const item = compItems.find(x => x.id === id);
    if (!item) return;
    if (field === "price") item.price = parseFloat(val) || 0;
    if (field === "pct")   item.pct   = parseInt(val)   || 100;
    saveComp();
    const total = compItems.reduce((s, x) => s + x.price * (x.pct / 100), 0);
    const el = document.getElementById("compTotal");
    if (el) el.textContent = `Total: $${total.toFixed(2)}`;
  }

  function renderComp() {
    const section = document.getElementById("compSection");
    if (compItems.length === 0) { section.innerHTML = ""; return; }

    const total = compItems.reduce((s, x) => s + x.price * (x.pct / 100), 0);

    const pctOptions = [100,95,90,85,80,75,70,65,60,55,50]
      .map(v => `<option value="${v}">${v}%</option>`).join("");

    let rows = compItems.map(item => `
      <tr>
        <td class="card-label">${escHtml(item.label)}</td>
        <td>
          <span class="price-cell">
            <span class="price-cell-dollar">$</span>
            <input class="comp-price-input" type="number" min="0" step="0.01"
              value="${item.price.toFixed(2)}"
              oninput="updateCompField(${item.id},'price',this.value)"
              onchange="updateCompField(${item.id},'price',this.value)" />
          </span>
        </td>
        <td>
          <select class="comp-pct-select" onchange="updateCompField(${item.id},'pct',this.value)">
            ${pctOptions.replace(`value="${item.pct}"`, `value="${item.pct}" selected`)}
          </select>
        </td>
        <td><button class="del-btn" onclick="deleteComp(${item.id})">×</button></td>
      </tr>`).join("");

    section.innerHTML = `
      <div class="comp-section">
        <table class="comp-table">
          <thead><tr><th>Card</th><th>Price</th><th>%</th><th></th></tr></thead>
          <tbody>
            ${rows}
            <tr class="comp-total-row">
              <td colspan="3" id="compTotal">Total: $${total.toFixed(2)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <button class="clear-all-btn" onclick="clearAllComp()">Clear All</button>
      </div>`;
  }

  window.onload = () => { update(); renderComp(); };
</script>
